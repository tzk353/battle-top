<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="陀螺管理">
<title>BATTLE TOP 銷貨系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0f0a1e;color:#e8e0ff;font-family:'Noto Sans TC',sans-serif;min-height:100vh;overscroll-behavior:none;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#5b3fa0;border-radius:4px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.spin{animation:spin 8s linear infinite;}
header{position:sticky;top:0;z-index:50;background:rgba(15,10,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid #2d1f5e;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.header-title{font-size:13px;font-weight:900;background:linear-gradient(90deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-sub{font-size:10px;color:#6d5fa0;margin-top:1px;}
.tabs{display:flex;gap:3px;padding:10px 10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;background:transparent;border:1px solid transparent;border-radius:10px;color:#6d5fa0;padding:10px 12px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;min-height:44px;white-space:nowrap;transition:all .2s;}
.tab-btn.active{background:#2d1f5e44;border-color:#5b3fa0;color:#c4b5fd;}
main{padding:12px;padding-bottom:64px;}
.card{background:linear-gradient(135deg,#1e1240,#17102e);border:1px solid #2d1f5e;border-radius:16px;padding:16px;animation:fadeIn .35s ease;margin-bottom:12px;}
.card-title{font-weight:700;font-size:14px;color:#c4b5fd;margin-bottom:10px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:linear-gradient(135deg,#1e1240,#17102e);border:1px solid #2d1f5e;border-radius:14px;padding:14px;text-align:center;}
.btn{border:none;cursor:pointer;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;padding:12px 18px;transition:all .15s;user-select:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{opacity:.75;transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;}
.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff;}
.btn-warning{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;min-width:48px;min-height:48px;font-size:18px;padding:10px;}
.btn-outline{background:transparent;border:1px solid #4f3a8a;color:#c4b5fd;}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-ship-p{background:linear-gradient(135deg,#1e1240,#17102e);border:2px dashed #f59e0b;color:#f59e0b;border-radius:10px;padding:10px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ship-d{background:linear-gradient(135deg,#064e3b,#065f46);border:2px solid #10b981;color:#10b981;border-radius:10px;padding:10px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ship-p:active,.btn-ship-d:active{opacity:.7;}
.input{background:#1a1035;border:1px solid #3d2d72;border-radius:10px;color:#e8e0ff;padding:14px;font-family:inherit;font-size:16px;width:100%;outline:none;}
.input:focus{border-color:#7c3aed;}
.input-date{background:#1a1035;border:1px solid #3d2d72;border-radius:10px;color:#e8e0ff;padding:12px 14px;font-family:inherit;font-size:15px;flex:1;outline:none;min-width:0;}
.input-date:focus{border-color:#7c3aed;}
select.input{appearance:none;}
label.lbl{font-size:13px;color:#a78bfa;display:block;margin-bottom:6px;}
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.tag-p{background:#2d1a00;color:#fbbf24;}
.tag-d{background:#064e3b22;color:#10b981;border:1px solid #065f46;}
.overlay{display:none;position:fixed;inset:0;background:#000000bb;z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;animation:fadeIn .2s ease;}
.sheet{background:#1a1035;border:1px solid #3d2d72;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;animation:slideUp .3s ease;max-height:88vh;overflow-y:auto;}
.sheet-title{font-weight:900;font-size:17px;margin-bottom:16px;}
.confirm-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:center;justify-content:center;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#1a1035;border:1px solid #ef4444;border-radius:20px;padding:28px 20px;width:88%;max-width:340px;text-align:center;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;z-index:300;white-space:nowrap;display:none;}
.badge{background:#ef4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1545;}
.item-row:last-child{border-bottom:none;}
.pill{border:1px solid #2d1f5e;background:transparent;color:#6d5fa0;border-radius:20px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;}
.pill.a-all{border-color:#5b3fa0;background:#2d1f5e44;color:#c4b5fd;}
.pill.a-p{border-color:#f59e0b;background:#2d1a00;color:#f59e0b;}
.pill.a-d{border-color:#10b981;background:#064e3b22;color:#10b981;}
.pill.a-rp{border-color:#7c3aed;background:#7c3aed22;color:#c4b5fd;}
.empty{text-align:center;padding:48px 20px;color:#4f3a8a;}
.profit-preview{background:#0f0a1e;border-radius:10px;padding:12px;margin-bottom:14px;}
.sale-card{border-radius:16px;padding:16px;margin-bottom:12px;animation:fadeIn .35s ease;background:linear-gradient(135deg,#1e1240,#17102e);border:1px solid #2d1f5e;}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
/* Buyer autocomplete */
.buyer-wrap{position:relative;}
.buyer-list{position:absolute;top:100%;left:0;right:0;background:#1e1240;border:1px solid #5b3fa0;border-radius:10px;z-index:50;max-height:180px;overflow-y:auto;display:none;}
.buyer-list.open{display:block;}
.buyer-item{padding:12px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid #2d1f5e;}
.buyer-item:last-child{border-bottom:none;}
.buyer-item:active{background:#2d1f5e;}
/* Search bar */
.search-bar{background:#1a1035;border:1px solid #3d2d72;border-radius:10px;color:#e8e0ff;padding:12px 14px;font-family:inherit;font-size:15px;width:100%;outline:none;margin-bottom:12px;}
.search-bar:focus{border-color:#7c3aed;}
/* Login */
#loginScreen{position:fixed;inset:0;background:#0f0a1e;z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
/* Sync dot */
#syncDot{width:8px;height:8px;border-radius:50%;background:#6d5fa0;display:inline-block;margin-left:6px;flex-shrink:0;}
#syncDot.syncing{background:#f59e0b;animation:spin 1s linear infinite;}
#syncDot.ok{background:#10b981;}
#syncDot.err{background:#ef4444;}
</style>
</head>
<body>

<!-- Login Screen -->

<div id="loginScreen">
  <div class="spin" style="font-size:56px">🌀</div>
  <div style="text-align:center">
    <div style="font-size:20px;font-weight:900;color:#c4b5fd;margin-bottom:4px">BATTLE TOP</div>
    <div style="font-size:13px;color:#6d5fa0">戰鬥陀螺銷售管理系統</div>
  </div>
  <div style="width:100%;max-width:300px">
    <div id="loginStatus" style="font-size:13px;color:#6d5fa0;text-align:center;margin-bottom:12px">請登入以使用系統</div>
    <input class="input" id="loginEmail" type="email" placeholder="電子郵件" style="margin-bottom:10px">
    <input class="input" id="loginPassword" type="password" placeholder="密碼（至少6位）" style="margin-bottom:14px">
    <button class="btn btn-primary" style="width:100%;margin-bottom:10px;font-size:15px" onclick="doEmailLogin()">🔑 登入</button>
    <button class="btn btn-outline" style="width:100%;font-size:15px" onclick="doEmailRegister()">📝 第一次使用？註冊帳號</button>
    <div id="loginErr" style="font-size:12px;color:#ef4444;display:none;text-align:center;margin-top:10px;line-height:1.6"></div>
  </div>
</div>

<!-- App -->

<div id="appShell" style="display:none">
<header>
  <div class="spin" style="font-size:22px">🌀</div>
  <div>
    <div class="header-title">BATTLE TOP 銷貨系統</div>
    <div class="header-sub" id="userEmail">載入中</div>
  </div>
  <span id="syncDot"></span>
  <button class="btn btn-success btn-sm" style="margin-left:auto" onclick="openSellModal()">🛒 記錄</button>
  <button class="btn btn-outline btn-sm" style="padding:8px 10px;font-size:16px" onclick="askConfirm('確定要登出嗎？','logout',0)">⎋</button>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard',this)">📊 總覽</button>
  <button class="tab-btn" onclick="switchTab('inventory',this)">📦 庫存</button>
  <button class="tab-btn" onclick="switchTab('sell',this)">🛒 銷售</button>
  <button class="tab-btn" onclick="switchTab('shipping',this)">🚚 出貨<span class="badge" id="pendingBadge" style="display:none"></span></button>
  <button class="tab-btn" onclick="switchTab('buyers',this)">👥 買家</button>
  <button class="tab-btn" onclick="switchTab('report',this)">📈 報表</button>
</div>

<main>
  <div id="tab-dashboard"></div>
  <div id="tab-inventory" style="display:none"></div>
  <div id="tab-sell" style="display:none"></div>
  <div id="tab-shipping" style="display:none"></div>
  <div id="tab-buyers" style
